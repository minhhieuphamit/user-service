name: Build and Deploy to VPS

on:
  push:
    branches:
      - main       # Deploy production khi push lên main
      - develop    # Deploy staging khi push lên develop

env:
  SERVICE_NAME: user-service
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/user-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Grant execute permission cho gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build JAR (bỏ qua test để build nhanh hơn, bỏ flag -x test nếu muốn chạy test)
      - name: Build with Gradle
        run: ./gradlew api:bootJar -x test --no-daemon

      # 5. Xác định tag Docker theo branch
      - name: Set Docker tag
        id: vars
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=${{ env.SERVICE_NAME }}-prod" >> $GITHUB_OUTPUT
            echo "HOST_PORT=8081" >> $GITHUB_OUTPUT
          else
            echo "TAG=staging" >> $GITHUB_OUTPUT
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=${{ env.SERVICE_NAME }}-staging" >> $GITHUB_OUTPUT
            echo "HOST_PORT=8082" >> $GITHUB_OUTPUT
          fi

      # 6. Login vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Build và push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      # 8. Deploy lên VPS qua SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Pull image mới nhất
            docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.TAG }}

            # Dừng và xóa container cũ
            docker stop ${{ steps.vars.outputs.CONTAINER_NAME }} || true
            docker rm ${{ steps.vars.outputs.CONTAINER_NAME }} || true

            # Chạy container mới
            docker run -d \
              --name ${{ steps.vars.outputs.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ steps.vars.outputs.HOST_PORT }}:8081 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e SERVER_PORT=8081 \
              -e SPRING_PROFILES_ACTIVE=${{ steps.vars.outputs.ENV }} \
              ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.TAG }}

            # Xóa các image cũ không dùng để giải phóng disk
            docker image prune -f

            echo "Deploy ${{ steps.vars.outputs.CONTAINER_NAME }} completed!"

      # 9. Thông báo kết quả (tuỳ chọn)
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment to ${{ steps.vars.outputs.ENV }} SUCCEEDED!"
          else
            echo "Deployment to ${{ steps.vars.outputs.ENV }} FAILED!"
          fi
