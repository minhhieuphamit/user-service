plugins {
    id 'application'
}

dependencies {
    implementation project(':core')
    implementation project(':infra')
}

application {
    mainClass = 'com.acme.ecommerce.user.api.UserServiceApiApplication'
}

// Only api module produces bootJar
bootJar {
    enabled = true
    mainClass = 'com.acme.ecommerce.user.api.UserServiceApiApplication'
}

bootRun {
    workingDir = rootProject.projectDir
}

jar {
    enabled = false
}
